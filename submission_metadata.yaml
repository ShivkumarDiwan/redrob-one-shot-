ai_usage_summary: |
  Used Claude for code review and architectural discussions. Used GitHub Copilot for autocomplete and refactoring.
  No candidate data was sent to any LLM. The ranking logic runs purely on CPU with precomputed features.

methodology_summary: |
  Hybrid ranker with four components:
  - Career score: product vs consulting, ranking system keywords, strict rejection of consulting-heavy profiles.
  - Behavioral score: recency, recruiter response rate, interview completion, open to work, saved by recruiters, notice period.
  - Location score: Pune/Noida, Tier‑1 cities, willingness to relocate.
  - Honeypot detection: expert skills with zero years, impossible timelines, zero recruiter interaction, senior title with <2 years experience.
  Precomputed features once (3 min), ranking step under 1 second. No hardcoding, no external API calls.

